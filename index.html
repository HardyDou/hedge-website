<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hedge - 安全简洁的密码管家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
    header { padding: 60px 0; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 10px; }
    .tagline { font-size: 1.25rem; color: #666; margin-bottom: 30px; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; margin: 60px 0; }
    .feature { text-align: center; padding: 30px; background: #f8f8f8; border-radius: 12px; }
    .feature h3 { margin-bottom: 10px; font-size: 1.1rem; }
    .feature p { color: #666; font-size: 0.9rem; }
    .cta { text-align: center; margin: 40px 0; }
    .cta a { display: inline-block; padding: 14px 32px; background: #007aff; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 500; }
    .cta a:hover { background: #0066d6; }
    nav { margin-top: 40px; text-align: center; }
    nav a { margin: 0 15px; color: #666; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #007aff; }
    footer { text-align: center; padding: 40px 0; color: #999; font-size: 0.85rem; margin-top: 60px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Hedge</h1>
      <p class="tagline">安全简洁的密码管家</p>
      <nav>
        <a href="/">首页</a>
        <a href="/support">支持</a>
        <a href="/privacy">隐私政策</a>
      </nav>
    </header>

    <main>
      <div class="cta">
        <a href="https://apps.apple.com/app/hedge" target="_blank">App Store 下载</a>
      </div>

      <div class="features">
        <div class="feature">
          <h3>🔒 零知识架构</h3>
          <p>您的数据仅存储在本地，我们无法访问您的密码</p>
        </div>
        <div class="feature">
          <h3>🛡️ AES-256 加密</h3>
          <p>军用级加密保护您的敏感信息</p>
        </div>
        <div class="feature">
          <h3>☁️ 同步无忧</h3>
          <p>支持 iCloud Drive、WebDAV，您掌控自己的数据</p>
        </div>
        <div class="feature">
          <h3>🔐 密码 + 验证码</h3>
          <p>安全存储密码与两步验证码</p>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 Hedge. 您的密码，坚若磐石。</p>
    </footer>
  </div>
</body>
</html>
